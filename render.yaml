services:
  - type: web
    name: groundwater-ahp-leafmap
    env: python
    pythonVersion: 3.11.8  # Force Python 3.11
    buildCommand: |
      apt-get update && apt-get install -y gdal-bin libgdal-dev
      python --version  # This will show us which Python is used
      pip install --upgrade pip
      pip install numpy==1.24.3
      pip install rasterio==1.3.10 --no-binary rasterio
      pip install -r backend/requirements.txt
      echo "=== Current directory contents ==="
      ls -la
      echo "=== Frontend directory contents ==="
      ls -la frontend/ || echo "❌ frontend/ not found"
      echo "=== Backend directory contents ==="
      ls -la backend/
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /tmp/groundwater-data
