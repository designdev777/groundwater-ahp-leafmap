services:
  - type: web
    name: groundwater-ahp-leafmap
    runtime: python
    repo: https://github.com/YOUR_USERNAME/groundwater-ahp-leafmap
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /app/data